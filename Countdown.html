<!DOCTYPE html>
<html>
<head>
<title>Transmission Countdown</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
padding-top:120px;
}

#timer{
font-size:50px;
margin-top:40px;
}
</style>

</head>

<body>

<h1>INCOMING TRANSMISSION</h1>
<p>The next message will arrive soon.</p>

<div id="timer"></div>

<script>

// Set the target date (CHANGE THIS)
var targetDate = new Date("March 14, 2026 16:00:00").getTime();

var timer = setInterval(function(){

var now = new Date().getTime();

var distance = targetDate - now;

var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
var seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("timer").innerHTML =
hours + "h " + minutes + "m " + seconds + "s ";

if(distance < 0){
clearInterval(timer);
document.getElementById("timer").innerHTML = "TRANSMISSION UNLOCKED";
}

},1000);

</script>

</body>
</html>
